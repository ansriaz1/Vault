<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pak-Doc Vault | Mobile Storage Edition</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eef2f7; margin: 0; padding: 15px; }
        .container { max-width: 450px; margin: auto; background: white; padding: 20px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        h2 { color: #1e3799; text-align: center; font-size: 24px; margin-bottom: 20px; }
        
        /* High-Visibility Search */
        .search-box { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 12px; border: 2px solid #1e3799; box-sizing: border-box; font-size: 16px; outline: none; }

        .upload-section { background: #f9f9f9; padding: 20px; border-radius: 15px; border: 2px dashed #cbd5e0; margin-bottom: 20px; text-align: center; }
        input[type="file"] { margin: 10px 0; font-size: 14px; width: 100%; }
        
        .btn-save { background: #1e3799; color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; box-shadow: 0 4px 10px rgba(30, 55, 153, 0.3); }
        .btn-save:active { transform: scale(0.98); }

        /* Document List Styling */
        .doc-list { margin-top: 25px; }
        .doc-card { background: #fff; padding: 15px; border-radius: 15px; margin-bottom: 12px; border: 1px solid #edf2f7; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .info b { display: block; font-size: 16px; color: #2d3748; }
        .info span { font-size: 11px; color: #fff; background: #0984e3; padding: 2px 8px; border-radius: 20px; text-transform: uppercase; }
        
        .download-link { text-decoration: none; color: #1e3799; font-weight: bold; background: #e0e7ff; padding: 8px 12px; border-radius: 8px; font-size: 13px; }
        .del-btn { background: none; border: none; color: #e53e3e; font-size: 18px; margin-left: 10px; cursor: pointer; }
        
        #status { font-size: 12px; color: #4a5568; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>📂 Digital Vault</h2>
    
    <input type="text" id="search" class="search-box" placeholder="🔍 Type name to find...">

    <div class="upload-section">
        <input type="text" id="docTitle" placeholder="Document Title (e.g. Science PDF)" style="width:100%; padding:10px; margin-bottom:10px; border-radius:5px; border:1px solid #ddd;">
        
        <select id="docCategory" style="width:100%; padding:10px; margin-bottom:10px;">
            <option value="General">General</option>
            <option value="Business">Business</option>
            <option value="Bills">Bills</option>
            <option value="Study">Study</option>
        </select>

        <p style="font-size:12px; color:#666;">Tap below to open Phone Storage:</p>
        <input type="file" id="fileSelector" accept=".pdf,.doc,.docx,.jpg,.png">
        
        <button class="btn-save" onclick="processAndSave()">Save to Vault</button>
        <div id="status"></div>
    </div>

    <div id="docContainer" class="doc-list"></div>
</div>

<script>
    // Load and Show Documents
    function loadDocs(query = "") {
        const container = document.getElementById('docContainer');
        const docs = JSON.parse(localStorage.getItem('userVault')) || [];
        container.innerHTML = "";

        const filtered = docs.filter(d => 
            d.name.toLowerCase().includes(query.toLowerCase()) || 
            d.cat.toLowerCase().includes(query.toLowerCase())
        );

        filtered.reverse().forEach(d => {
            const div = document.createElement('div');
            div.className = 'doc-card';
            div.innerHTML = `
                <div class="info">
                    <span>${d.cat}</span>
                    <b>${d.name}</b>
                </div>
                <div style="display:flex; align-items:center;">
                    <a href="${d.fileData}" download="${d.name}" class="download-link">Open</a>
                    <button class="del-btn" onclick="removeDoc(${d.id})">🗑️</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    // Process File from Storage
    function processAndSave() {
        const title = document.getElementById('docTitle').value;
        const cat = document.getElementById('docCategory').value;
        const file = document.getElementById('fileSelector').files[0];
        const status = document.getElementById('status');

        if (!title || !file) {
            alert("Please enter a name and select a file from storage!");
            return;
        }

        status.innerText = "⏳ Converting file... please wait.";

        const reader = new FileReader();
        reader.onload = function(e) {
            const base64String = e.target.result;
            const newEntry = { id: Date.now(), name: title, cat: cat, fileData: base64String };
            
            let vault = JSON.parse(localStorage.getItem('userVault')) || [];
            vault.push(newEntry);
            
            try {
                localStorage.setItem('userVault', JSON.stringify(vault));
                status.innerText = "✅ Saved Successfully!";
                document.getElementById('docTitle').value = "";
                document.getElementById('fileSelector').value = "";
                loadDocs();
            } catch (err) {
                status.innerText = "❌ Storage full! Delete old files.";
            }
        };
        reader.readAsDataURL(file);
    }

    function removeDoc(id) {
        let vault = JSON.parse(localStorage.getItem('userVault')) || [];
        vault = vault.filter(item => item.id !== id);
        localStorage.setItem('userVault', JSON.stringify(vault));
        loadDocs();
    }

    // Search Trigger
    document.getElementById('search').addEventListener('input', (e) => {
        loadDocs(e.target.value);
    });

    // Initial Start
    loadDocs();
</script>

</body>
</html>
